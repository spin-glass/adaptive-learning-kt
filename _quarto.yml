project:
  type: default
  render:
    - "notebooks/*.qmd"
    - "README.md"
  # Exclude huge trees from Quarto's resource scan — massively speeds up
  # `quarto inspect` and `preview` in this repo (data/ is ~6GB, .venv/ is ~500MB).
  resources: []
  execute-dir: project

format:
  html:
    toc: true
    toc-depth: 3
    code-fold: show
    theme: cosmo
    embed-resources: true

jupyter: adaptive-learning-kt
