project:
  type: website
  render:
    - "notebooks/*.qmd"
    - "README.md"
  # Exclude huge trees from Quarto's resource scan — massively speeds up
  # `quarto inspect` and `preview` in this repo (data/ is ~6GB, .venv/ is ~500MB).
  resources: []
  execute-dir: project

website:
  title: "Adaptive Learning KT"
  navbar:
    left:
      - text: "Home"
        href: README.md
      - text: "01 EDA"
        href: notebooks/01-eda.qmd
      - text: "02 IRT+BKT"
        href: notebooks/02-irt-bkt.qmd

format:
  html:
    toc: true
    toc-depth: 3
    code-fold: show
    theme: cosmo

jupyter: adaptive-learning-kt
